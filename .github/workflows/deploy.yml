name: Deploy to Cloudflare Workers

# Every push to `main` builds the Next.js app via OpenNext and uploads
# the Worker to Cloudflare. `workflow_dispatch` lets you re-run a deploy
# manually from the Actions tab without pushing a new commit.
on:
  push:
    branches: [main]
  workflow_dispatch:

# A second push while a deploy is in flight cancels the in-flight one and
# starts a fresh build. Prevents two deploys racing each other to swap
# the Worker version.
concurrency:
  group: cloudflare-worker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build + deploy Worker
        env:
          CLOUDFLARE_API_TOKEN:           ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:          ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL:            ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_PMTILES_URL:        ${{ secrets.NEXT_PUBLIC_PMTILES_URL }}
          NEXT_PUBLIC_BUILD_SHA:          ${{ github.sha }}
        # The CF API token may lack Zone:Workers Routes:Edit. Wrangler
        # still uploads the Worker script successfully (which is what
        # actually swaps the live code), then fails when re-binding the
        # custom domains — but those bindings are already in place from
        # the prior deploy, so the failure is cosmetic. We accept it as
        # success when the upload line appears in the log; any other
        # failure mode (build error, auth failure, etc.) fails the job.
        run: |
          set +e
          npm run cf:deploy 2>&1 | tee deploy.log
          status=${PIPESTATUS[0]}
          if [ $status -eq 0 ]; then
            echo "::notice::Worker deployed cleanly."
            exit 0
          fi
          if grep -q "Uploaded indocity" deploy.log && grep -q "workers/routes" deploy.log; then
            echo "::warning::Worker uploaded successfully but route reconciliation failed (token missing Zone:Workers Routes:Edit). The new code IS live on citydrivers.id and cityriders.id. To clear this warning, add the missing scope to CLOUDFLARE_API_TOKEN."
            exit 0
          fi
          exit $status
