<!doctype html>
<html lang="id" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0A" />
  <title>City Rider — Tidak ada koneksi</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      background: #0A0A0A;
      color: #FFFFFF;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }
    /* Background image + dark scrim so the card stays legible. */
    .bg {
      position: fixed; inset: 0;
      background-image: url('https://ik.imagekit.io/nepgaxllc/ChatGPT%20Image%20May%2019,%202026,%2008_23_29%20PM.png?updatedAt=1779197024231&tr=f-auto,q-75,w-1200');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(10,10,10,0.55) 0%, rgba(10,10,10,0.85) 60%, rgba(10,10,10,0.95) 100%);
    }
    .wrap {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    /* Brand mark — mirrors AppNav: logo + "City <gradient>Rider</gradient>". */
    .brand {
      display: inline-flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.55));
    }
    .brand img {
      height: 36px; width: auto; display: block;
    }
    .brand .name {
      font-size: 22px; font-weight: 900;
      letter-spacing: -0.01em;
      color: #FFFFFF;
      line-height: 1;
    }
    .brand .name .accent {
      background: linear-gradient(135deg, #FACC15 0%, #EAB308 100%);
      -webkit-background-clip: text;
              background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card {
      width: 100%; max-width: 380px;
      background: rgba(10,10,10,0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 18px 60px rgba(0,0,0,0.45);
    }
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px;
      border-radius: 18px;
      background: rgba(250,204,21,0.12);
      border: 1px solid rgba(250,204,21,0.30);
      margin-bottom: 16px;
    }
    .badge svg { color: #FACC15; }
    h1 {
      font-size: 20px; font-weight: 900;
      margin: 0 0 10px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 14px; line-height: 1.55;
      color: rgba(255,255,255,0.75);
      margin: 0 0 20px;
    }
    button {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.85);
      background: linear-gradient(135deg, #FACC15, #EAB308);
      color: #0A0A0A;
      font-weight: 800; font-size: 14px;
      text-transform: uppercase; letter-spacing: 0.04em;
      box-shadow: 0 8px 24px rgba(250,204,21,0.18);
      cursor: pointer;
      min-height: 48px;
      font-family: inherit;
    }
    button:active { transform: scale(0.99); }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <main class="wrap">
    <div class="brand">
      <img
        src="https://ik.imagekit.io/nepgaxllc/Untitleddasdasdasasd-removebg-preview.png?updatedAt=1779015947714"
        alt=""
      />
      <div class="name">City <span class="accent">Rider</span></div>
    </div>
    <div class="card">
      <div class="badge" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22"></path>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <h1>Tidak ada koneksi</h1>
      <p>
        Periksa sinyal HP atau WiFi kamu lalu coba lagi. Profil rider, customer book,
        dan map tetap aman — semuanya akan muncul kembali begitu koneksi pulih.
      </p>
      <button type="button" onclick="window.location.reload()">
        Coba lagi
      </button>
    </div>
  </main>
</body>
</html>
